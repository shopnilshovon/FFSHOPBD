<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diamond Shop</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#020617;
}

.header{
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.notice{
text-align:center;
background:#f97316;
padding:8px;
}

.wallet{
text-align:center;
padding:10px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
max-width:480px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:12px;
padding:14px;
text-align:center;
}

.price{
color:#22c55e;
font-size:18px;
font-weight:bold;
}

.stock{
color:#facc15;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
margin-top:8px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.form{
background:#1e293b;
padding:20px;
border-radius:10px;
width:90%;
max-width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:10px;
background:#334155;
border-radius:6px;
cursor:pointer;
}

.active{
background:#22c55e!important;
}

.ticker{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:8px 14px;
border-radius:8px;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">💎 Diamond Shop</div>

<div class="notice">Minimum Deposit 100৳</div>

<div class="wallet">

<h3>Balance: <span id="balance">0</span>৳</h3>

<button onclick="openBalance()">Add Balance</button>

</div>

<div class="container">

<div class="card">
<h4>Weekly</h4>
<p class="price">110৳</p>
<p class="stock">Stock: 100</p>
<button onclick="order('Weekly')">Order</button>
</div>

<div class="card">
<h4>Monthly</h4>
<p class="price">500৳</p>
<p class="stock">Stock: 30</p>
<button onclick="order('Monthly')">Order</button>
</div>

<div class="card">
<h4>1240 💎</h4>
<p class="price">400৳</p>
<p class="stock">Stock: 10</p>
<button onclick="order('1240 Diamonds')">Order</button>
</div>

<div class="card">
<h4>2530 💎</h4>
<p class="price">900৳</p>
<p class="stock">Stock: 5</p>
<button onclick="order('2530 Diamonds')">Order</button>
</div>

</div>

<div class="ticker">
<span id="tickerText"></span>
</div>

<div class="popup" id="balancePopup">

<div class="form">

<h3>Add Balance</h3>

<input id="amount" placeholder="Enter Amount">

<div class="pay">

<div id="bkash" onclick="selectPay('bkash')">bKash</div>
<div id="nagad" onclick="selectPay('nagad')">Nagad</div>

</div>

<button onclick="nextStep()">Next</button>

<div id="step2" style="display:none">

<p>Send Money To</p>

<b>01810607626</b>

<input id="trx" placeholder="Transaction ID">

<button onclick="submitBalance()">Submit</button>

</div>

</div>

</div>

<script>

let method=""

function openBalance(){
document.getElementById("balancePopup").style.display="flex"
}

function selectPay(m){

method=m

document.getElementById("bkash").classList.remove("active")
document.getElementById("nagad").classList.remove("active")

document.getElementById(m).classList.add("active")

}

function nextStep(){

let amount=document.getElementById("amount").value

if(amount<100){
alert("Minimum deposit 100৳ required")
return
}

if(method==""){
alert("Select payment method")
return
}

document.getElementById("step2").style.display="block"

}

function submitBalance(){

alert("Balance request submitted")

document.getElementById("balancePopup").style.display="none"

}

function order(pkg){

alert(pkg+" order placed")

}

/* random buyers */

let names=[
"Rahim","Karim","Sakib","Rana","Jahid","Sohel","Rubel",
"Arif","Tanvir","Hasan","Nahid","Rakib","Shanto",
"Fahim","Nabil","Imran","Tarek","Masud","Bappy",
"Sohan","Anik","Tushar","Shakil","Rasel","Mahim",
"Rifat","Saif","Joy","Shuvo","Rabby","Tamim",
"Rony","Farhan","Minhaz","Akash","Sifat",
"Siam","Shimul","Rafi","Samir","Sumon",
"Habib","Shahid","Kamrul","Shamim","Nayeem"
]

let packs=[
"Weekly Membership",
"1240 Diamonds",
"2530 Diamonds",
"Monthly Membership"
]

setInterval(()=>{

let n=names[Math.floor(Math.random()*names.length)]
let p=packs[Math.floor(Math.random()*packs.length)]

document.getElementById("tickerText").innerText=
n+" bought "+p

},3000)

</script>

</body>
</html>
