<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diamond Shop</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
background:linear-gradient(270deg,#020617,#0f172a,#020617);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.header{
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.notice{
text-align:center;
background:#f97316;
padding:8px;
font-size:14px;
}

.wallet{
text-align:center;
padding:10px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
max-width:480px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:12px;
padding:14px;
text-align:center;
box-shadow:0 0 12px rgba(0,255,255,0.3);
transition:0.3s;
animation:cardFade .8s ease;
}

@keyframes cardFade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 18px #22c55e;
}

.price{
color:#22c55e;
font-size:18px;
font-weight:bold;
}

.stock{
color:#facc15;
font-size:13px;
}

button{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:14px;
}

table{
width:100%;
max-width:480px;
margin:auto;
margin-top:15px;
background:#1e293b;
border-radius:10px;
font-size:13px;
}

th,td{
padding:8px;
text-align:center;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
padding:20px;
}

.form{
background:#1e293b;
padding:20px;
border-radius:12px;
width:100%;
max-width:320px;
text-align:center;
animation:popup .3s ease;
}

@keyframes popup{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:10px;
background:#334155;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.pay .active{
background:#22c55e;
}

.loader{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
flex-direction:column;
}

.spinner{
width:40px;
height:40px;
border:4px solid #ddd;
border-top:4px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.alert{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
}

.alertBox{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
width:260px;
}

</style>

</head>

<body>

<div class="header">💎 Diamond Shop</div>

<div class="notice">Minimum Deposit 100৳</div>

<div class="wallet">

<h3>Balance: <span id="balance">0</span>৳</h3>

<button onclick="openBalance()">Add Balance</button>

</div>

<div class="container">

<div class="card">
<h4>Weekly</h4>
<p class="price">110৳</p>
<p class="stock">Stock: 100</p>
<button>Order</button>
</div>

<div class="card">
<h4>Monthly</h4>
<p class="price">500৳</p>
<p class="stock">Stock: 30</p>
<button>Order</button>
</div>

<div class="card">
<h4>1240 💎</h4>
<p class="price">400৳</p>
<p class="stock">Stock: 10</p>
<button>Order</button>
</div>

<div class="card">
<h4>2530 💎</h4>
<p class="price">900৳</p>
<p class="stock">Stock: 5</p>
<button>Order</button>
</div>

</div>

</body>
</html>
