<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diamond Shop</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* particles */

.particles span{
position:fixed;
width:4px;
height:4px;
background:#22c55e;
border-radius:50%;
animation:particle 12s linear infinite;
opacity:.5;
}

@keyframes particle{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* diamonds */

.diamond{
position:fixed;
font-size:20px;
animation:diamondFloat 14s linear infinite;
opacity:.6;
}

@keyframes diamondFloat{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

.header{
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.notice{
background:#f97316;
text-align:center;
padding:8px;
}

.online{
text-align:center;
color:#22c55e;
font-size:13px;
}

.wallet{
text-align:center;
padding:10px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
max-width:480px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:12px;
padding:14px;
text-align:center;
box-shadow:0 0 10px rgba(34,197,94,.3);
}

.price{
color:#22c55e;
font-size:18px;
font-weight:bold;
}

.stock{
font-size:12px;
color:#facc15;
}

.progress{
background:#0f172a;
height:6px;
border-radius:6px;
overflow:hidden;
margin-top:6px;
}

.bar{
height:6px;
background:#22c55e;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
margin-top:8px;
}

.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:10px;
background:#334155;
border-radius:6px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.pay div.active{
background:#22c55e;
transform:scale(1.05);
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.form{
background:#1e293b;
padding:20px;
border-radius:10px;
width:90%;
max-width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

/* ticker */

.ticker{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:8px 14px;
border-radius:8px;
font-size:13px;
}

/* notification */

.notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:10px 16px;
border-radius:10px;
font-size:13px;
box-shadow:0 0 12px rgba(34,197,94,.5);
display:none;
}

/* bottom nav */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:8px 0;
border-top:1px solid #334155;
}

.bottomNav div{
background:#1e293b;
width:70px;
height:55px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
cursor:pointer;
transition:.3s;
}

.bottomNav div:hover{
background:#22c55e;
transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="particles">
<span style="left:10%"></span>
<span style="left:30%"></span>
<span style="left:50%"></span>
<span style="left:70%"></span>
<span style="left:90%"></span>
</div>

<div class="diamond" style="left:20%">💎</div>
<div class="diamond" style="left:50%">💎</div>
<div class="diamond" style="left:80%">💎</div>

<div class="header">💎 Diamond Shop</div>

<div class="notice">Minimum Deposit 100৳</div>

<div class="online">
🟢 <span id="onlineUsers">12</span> users online
</div>

<div class="wallet">

<h3>Balance: <span id="balance">0</span>৳</h3>

<button onclick="openBalance()">Add Balance</button>

</div>

<div class="container">

<div class="card">
<h4>Weekly</h4>
<p class="price">110৳</p>
<p class="stock">Stock:100</p>
<div class="progress"><div class="bar" style="width:90%"></div></div>
<button onclick="order('Weekly')">Order</button>
</div>

<div class="card">
<h4>Monthly</h4>
<p class="price">500৳</p>
<p class="stock">Stock:30</p>
<div class="progress"><div class="bar" style="width:70%"></div></div>
<button onclick="order('Monthly')">Order</button>
</div>

<div class="card">
<h4>1240 💎</h4>
<p class="price">400৳</p>
<p class="stock">Stock:10</p>
<div class="progress"><div class="bar" style="width:60%"></div></div>
<button onclick="order('1240 Diamonds')">Order</button>
</div>

<div class="card">
<h4>2530 💎</h4>
<p class="price">900৳</p>
<p class="stock">Stock:5</p>
<div class="progress"><div class="bar" style="width:40%"></div></div>
<button onclick="order('2530 Diamonds')">Order</button>
</div>

</div>

<div class="ticker">
<span id="tickerText"></span>
</div>

<div class="notify" id="notifyBox">
💎 <span id="notifyText"></span>
</div>

<div class="popup" id="balancePopup">

<div class="form">

<h3>Add Balance</h3>

<input id="amount" placeholder="Enter Amount">

<div class="pay">
<div id="bkash" onclick="selectPay('bkash')">bKash</div>
<div id="nagad" onclick="selectPay('nagad')">Nagad</div>
</div>

<button onclick="nextStep()">Next</button>

<div id="step2" style="display:none">

<p>Send money to</p>

<b>01810607626</b>

<input placeholder="Transaction ID">

<button onclick="submitBalance()">Submit</button>

<button onclick="closePopup()">Cancel</button>

</div>

</div>

</div>

<div class="bottomNav">

<div onclick="scrollTo(0,0)">🏠<br>Home</div>
<div onclick="openBalance()">💰<br>Add</div>
<div onclick="alert('Orders')">📦<br>Orders</div>
<div onclick="alert('Support')">📞<br>Support</div>

</div>

<script>

/* online users */

setInterval(()=>{
let num=Math.floor(Math.random()*30)+5
document.getElementById("onlineUsers").innerText=num
},4000)

/* payment */

let method=""

function selectPay(m){

method=m

document.getElementById("bkash").classList.remove("active")
document.getElementById("nagad").classList.remove("active")

document.getElementById(m).classList.add("active")

}

function openBalance(){
document.getElementById("balancePopup").style.display="flex"
}

function closePopup(){
document.getElementById("balancePopup").style.display="none"
}

function nextStep(){

let amount=document.getElementById("amount").value

if(amount<100){
alert("Minimum deposit 100৳ required")
return
}

if(method==""){
alert("Select payment method")
return
}

document.getElementById("step2").style.display="block"

}

function submitBalance(){

alert("Balance request submitted")

closePopup()

}

function order(pkg){
alert(pkg+" order placed")
}

/* random buyers */

let names=[
"Rahim","Karim","Sakib","Rana","Jahid","Sohel","Rubel",
"Arif","Tanvir","Hasan","Nahid","Rakib","Shanto",
"Fahim","Nabil","Imran","Tarek","Masud","Bappy",
"Sohan","Anik","Tushar","Shakil","Rasel","Mahim",
"Rifat","Saif","Joy","Shuvo","Rabby","Tamim",
"Rony","Farhan","Minhaz","Akash","Sifat",
"Siam","Shimul","Rafi","Samir","Sumon",
"Habib","Shahid","Kamrul","Shamim","Nayeem"
]

let packs=[
"Weekly Membership",
"1240 Diamonds",
"2530 Diamonds",
"Monthly Membership"
]

setInterval(()=>{

let n=names[Math.floor(Math.random()*names.length)]
let p=packs[Math.floor(Math.random()*packs.length)]

document.getElementById("tickerText").innerText=n+" bought "+p

let box=document.getElementById("notifyBox")
let text=document.getElementById("notifyText")

text.innerText=n+" purchased "+p

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

},6000)

</script>

</body>
</html>
