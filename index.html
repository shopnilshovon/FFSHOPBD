<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diamond Shop</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#020617;
color:white;
overflow-x:hidden;
}

/* particle background */

.particles span{
position:fixed;
width:4px;
height:4px;
background:#22c55e;
border-radius:50%;
animation:particles 12s linear infinite;
opacity:.6;
}

@keyframes particles{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* floating diamonds */

.diamond{
position:fixed;
font-size:20px;
animation:diamondFloat 14s linear infinite;
opacity:.6;
}

@keyframes diamondFloat{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

.header{
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
}

.notice{
background:#f97316;
text-align:center;
padding:10px;
}

.online{
text-align:center;
color:#22c55e;
margin-top:6px;
}

.wallet{
text-align:center;
margin:20px 0;
}

.addBtn{
width:90%;
max-width:420px;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
}

/* cards */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
max-width:480px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:14px;
padding:16px;
text-align:center;
box-shadow:0 0 16px rgba(34,197,94,.2);
}

.price{
color:#22c55e;
font-size:20px;
font-weight:bold;
}

.stock{
font-size:12px;
color:#facc15;
}

.progress{
background:#0f172a;
height:6px;
border-radius:6px;
margin-top:8px;
overflow:hidden;
}

.bar{
height:6px;
background:#22c55e;
}

.orderBtn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:1000;
}

.form{
background:#1e293b;
padding:20px;
border-radius:14px;
width:90%;
max-width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:10px;
border-radius:8px;
text-align:center;
color:white;
font-weight:bold;
cursor:pointer;
}

/* bkash nagad colors */

#bkash{
background:linear-gradient(135deg,#e2136e,#b80c88);
}

#nagad{
background:#f97316;
}

.pay div.active{
transform:scale(1.08);
box-shadow:0 0 10px rgba(255,255,255,.5);
}

.copyBtn{
background:#3b82f6;
margin-top:10px;
}

.submitBtn{
background:#22c55e;
margin-top:10px;
}

.cancelBtn{
background:#ef4444;
margin-top:10px;
}

/* notification */

.notify{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:12px 18px;
border-radius:14px;
font-size:13px;
box-shadow:0 0 20px rgba(34,197,94,.6);
display:none;
z-index:2000;
}

/* bottom nav */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:8px 0;
border-top:1px solid #334155;
}

.bottomNav div{
background:#1e293b;
width:70px;
height:55px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
}

.bottomNav div.active{
background:#22c55e;
}

</style>
</head>

<body>

<div class="particles">
<span style="left:10%"></span>
<span style="left:30%"></span>
<span style="left:50%"></span>
<span style="left:70%"></span>
<span style="left:90%"></span>
</div>

<div class="diamond" style="left:20%">💎</div>
<div class="diamond" style="left:60%">💎</div>

<div class="header">💎 Diamond Shop</div>

<div class="notice">Minimum Deposit 100৳</div>

<div class="online">
🟢 <span id="onlineUsers">15</span> users online
</div>

<div class="wallet">
<h2>Balance: <span id="balance">0</span>৳</h2>

<button class="addBtn" onclick="openBalance()">Add Balance</button>
</div>

<div class="container">

<div class="card">
<h4>Weekly</h4>
<p class="price">110৳</p>
<p class="stock">Stock:100</p>
<div class="progress"><div class="bar" style="width:90%"></div></div>
<button class="orderBtn">Order</button>
</div>

<div class="card">
<h4>Monthly</h4>
<p class="price">500৳</p>
<p class="stock">Stock:30</p>
<div class="progress"><div class="bar" style="width:70%"></div></div>
<button class="orderBtn">Order</button>
</div>

<div class="card">
<h4>1240 💎</h4>
<p class="price">400৳</p>
<p class="stock">Stock:10</p>
<div class="progress"><div class="bar" style="width:60%"></div></div>
<button class="orderBtn">Order</button>
</div>

<div class="card">
<h4>2530 💎</h4>
<p class="price">900৳</p>
<p class="stock">Stock:5</p>
<div class="progress"><div class="bar" style="width:40%"></div></div>
<button class="orderBtn">Order</button>
</div>

</div>

<div class="notify" id="notifyBox">
💎 <span id="notifyText"></span>
</div>

<div class="popup" id="balancePopup">

<div class="form">

<h3>Add Balance</h3>

<input id="amount" placeholder="Enter Amount">

<div class="pay">
<div id="bkash" onclick="selectPay('bkash')">bKash</div>
<div id="nagad" onclick="selectPay('nagad')">Nagad</div>
</div>

<button class="submitBtn" onclick="nextStep()">Next</button>

<div id="step2" style="display:none">

<p>Send money to</p>

<b id="number">01810607626</b>

<button class="copyBtn" onclick="copyNumber()">Copy Number</button>

<input placeholder="Transaction ID">

<button class="submitBtn">Submit</button>

<button class="cancelBtn" onclick="closePopup()">Cancel</button>

</div>

</div>

</div>

<div class="bottomNav">

<div class="active">
🏠
Home
</div>

<div onclick="openBalance()">
💰
Add
</div>

<div>
📦
Orders
</div>

<div>
📞
Support
</div>

</div>

<script>

/* online users */

setInterval(()=>{
document.getElementById("onlineUsers").innerText=
Math.floor(Math.random()*25)+8
},4000)

/* payment select */

let method=""

function selectPay(m){

method=m

document.getElementById("bkash").classList.remove("active")
document.getElementById("nagad").classList.remove("active")

document.getElementById(m).classList.add("active")

}

function openBalance(){
document.getElementById("balancePopup").style.display="flex"
}

function closePopup(){
document.getElementById("balancePopup").style.display="none"
}

function nextStep(){

let amount=document.getElementById("amount").value

if(amount<100){

showNotify("Minimum deposit 100৳ required")

return

}

if(method==""){

showNotify("Select payment method")

return

}

document.getElementById("step2").style.display="block"

}

function copyNumber(){

navigator.clipboard.writeText("01810607626")

showNotify("Number copied")

}

/* notification */

function showNotify(text){

let box=document.getElementById("notifyBox")
let txt=document.getElementById("notifyText")

txt.innerText=text

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

/* random buyer */

let names=[
"Rahim","Karim","Sakib","Rana","Jahid","Sohel","Rubel",
"Arif","Tanvir","Hasan","Nahid","Rakib","Shanto",
"Fahim","Nabil","Imran","Tarek","Masud","Bappy",
"Sohan","Anik","Tushar","Shakil","Rasel","Mahim",
"Rifat","Saif","Joy","Shuvo","Rabby","Tamim",
"Rony","Farhan","Minhaz","Akash","Sifat",
"Siam","Shimul","Rafi","Samir","Sumon",
"Habib","Shahid","Kamrul","Shamim","Nayeem"
]

let packs=[
"Weekly Membership",
"1240 Diamonds",
"2530 Diamonds",
"Monthly Membership"
]

setInterval(()=>{

let n=names[Math.floor(Math.random()*names.length)]
let p=packs[Math.floor(Math.random()*packs.length)]

showNotify(n+" purchased "+p)

},7000)

</script>

</body>
</html>
