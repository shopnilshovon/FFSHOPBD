<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Diamond Shop</title><style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
background:#020617;
color:white;
overflow-x:hidden;
}

/* particles */

.particle{
position:fixed;
width:3px;
height:3px;
background:#22c55e;
opacity:.6;
animation:particles 12s linear infinite;
}

@keyframes particles{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* floating diamonds */

.diamond{
position:fixed;
font-size:18px;
opacity:.4;
animation:diamondFloat 14s linear infinite;
}

@keyframes diamondFloat{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* header */

.header{
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
}

.notice{
background:#f97316;
text-align:center;
padding:10px;
}

.timer{
text-align:center;
color:#facc15;
margin-top:4px;
}

.online{
text-align:center;
color:#22c55e;
margin-top:6px;
}

/* wallet */

.wallet{text-align:center;margin:20px 0}

.addBtn{
width:90%;
max-width:420px;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
}

/* cards */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
max-width:480px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:14px;
padding:16px;
text-align:center;
transition:.3s;
}

.card:hover{transform:scale(1.03)}

.price{color:#22c55e;font-size:20px;font-weight:bold}

.stock{font-size:12px;color:#facc15}

.barBox{
background:#0f172a;
height:6px;
border-radius:6px;
margin-top:6px;
overflow:hidden;
}

.bar{
height:6px;
background:#22c55e;
width:100%;
transition:.3s;
}

.orderBtn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.form{
background:#1e293b;
padding:20px;
border-radius:14px;
width:90%;
max-width:320px;
text-align:center;
position:relative;
}

.closeBtn{
position:absolute;
right:12px;
top:8px;
font-size:18px;
cursor:pointer;
}

/* inputs */

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.pay{display:flex;gap:10px;margin-top:10px}

.pay div{
flex:1;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

#bkash{background:linear-gradient(135deg,#e2136e,#b80c88)}
#nagad{background:#f97316}

.pay div.active{transform:scale(1.05);box-shadow:0 0 10px white}

.btn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
color:white;
}

.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#3b82f6}

/* loader */

.loader{
border:4px solid #1e293b;
border-top:4px solid #22c55e;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:15px auto;
display:none;
}

@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* notify */

.notify{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:12px 18px;
border-radius:14px;
font-size:13px;
box-shadow:0 0 20px rgba(34,197,94,.6);
display:none;
}

/* reviews */

.reviews{
margin:20px auto;
max-width:420px;
text-align:center;
}

.reviewBox{
background:#1e293b;
padding:12px;
border-radius:10px;
font-size:13px;
}

/* bottom nav */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:8px 0;
border-top:1px solid #334155;
}

.bottomNav div{
background:#1e293b;
width:80px;
height:55px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
}

.bottomNav div.active{background:#22c55e}

.history{display:none;padding:20px}

.historyItem{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-top:10px;
}

</style></head><body><script>
for(let i=0;i<40;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"%"
document.body.appendChild(p)
}
</script><div class="diamond" style="left:20%">💎</div>
<div class="diamond" style="left:70%">💎</div><div class="header">💎 Diamond Shop</div><div class="notice">Limited Offer</div>
<div class="timer">Offer ends in <span id="timer">10:00</span></div><div class="online">🟢 <span id="onlineUsers">10</span> users online</div><div class="wallet">
<h2>Balance: <span id="balance">0</span>৳</h2>
<button class="addBtn" onclick="openBalance()">Add Balance</button>
</div><div class="container" id="shop"><div class="card">
<h4>Weekly</h4>
<p class="price">110৳</p>
<p class="stock">Stock: <span id="stock1">100</span></p>
<div class="barBox"><div class="bar" id="bar1"></div></div>
<button class="orderBtn" onclick="order('Weekly','stock1','bar1',100,110)">Order</button>
</div><div class="card">
<h4>Monthly</h4>
<p class="price">500৳</p>
<p class="stock">Stock: <span id="stock2">30</span></p>
<div class="barBox"><div class="bar" id="bar2"></div></div>
<button class="orderBtn" onclick="order('Monthly','stock2','bar2',30,500)">Order</button>
</div><div class="card">
<h4>1240 💎</h4>
<p class="price">400৳</p>
<p class="stock">Stock: <span id="stock3">10</span></p>
<div class="barBox"><div class="bar" id="bar3"></div></div>
<button class="orderBtn" onclick="order('1240 Diamonds','stock3','bar3',10,400)">Order</button>
</div><div class="card">
<h4>2530 💎</h4>
<p class="price">900৳</p>
<p class="stock">Stock: <span id="stock4">5</span></p>
<div class="barBox"><div class="bar" id="bar4"></div></div>
<button class="orderBtn" onclick="order('2530 Diamonds','stock4','bar4',5,900)">Order</button>
</div></div><div class="reviews">
<div class="reviewBox" id="reviewBox">⭐ Great service!</div>
</div><div class="notify" id="notifyBox">
<span id="notifyText"></span>
</div><!-- popup --><div class="popup" id="balancePopup">
<div class="form"><span class="closeBtn" onclick="closePopup()">✕</span>

<h3>Add Balance</h3><input id="amount" placeholder="Enter Amount"><div class="pay">
<div id="bkash" onclick="selectPay('bkash')">bKash</div>
<div id="nagad" onclick="selectPay('nagad')">Nagad</div>
</div><button class="btn green" onclick="nextStep()">Next</button>

<div class="loader" id="loader"></div><div id="step2" style="display:none"><p>Send money to</p><b>01810607626</b>

<button class="btn blue" onclick="copyNumber()">Copy Number</button>

<input id="trx" placeholder="Transaction ID"><button class="btn green" onclick="submitBalance()">Submit</button>

<button class="btn red" onclick="closePopup()">Cancel</button>

</div></div>
</div><script>

let balance=0
let method=""

/* random names */

let names=[
"Rahim","Karim","Sakib","Jahid","Naim","Rifat","Sohel","Rakib","Tanvir","Sohan",
"Rony","Shanto","Mahin","Sabbir","Imran","Arif","Nayeem","Hasan","Saif","Rasel",
"Riad","Siam","Tarek","Rubel","Jamal","Kamrul","Rafi","Minhaz","Akash","Shuvo",
"Fahim","Bappy","Sumon","Sakil","Noman","Ratul","Sajid","Shamim","Tuhin","Riadul",
"Parvez","Tanzim","Fardin","Hridoy","Arafat","Shahin","Asif","Nadim","Tajim","Sadi"
]

/* fake purchase */

setInterval(()=>{
let n=names[Math.floor(Math.random()*names.length)]
let packs=["Weekly","Monthly","1240 Diamonds","2530 Diamonds"]
let p=packs[Math.floor(Math.random()*packs.length)]
showNotify(n+" purchased "+p)
},6000)

/* reviews */

let reviews=[
"⭐ Fast delivery!",
"⭐ Trusted shop!",
"⭐ Best price!",
"⭐ Instant topup!",
"⭐ Highly recommended!"
]

setInterval(()=>{
document.getElementById("reviewBox").innerText=
reviews[Math.floor(Math.random()*reviews.length)]
},4000)

/* timer */

let time=600
setInterval(()=>{
time--
let m=Math.floor(time/60)
let s=time%60
document.getElementById("timer").innerText=m+":"+s
},1000)

/* online */

setInterval(()=>{
document.getElementById("onlineUsers").innerText=
Math.floor(Math.random()*20)+5
},4000)

/* notify */

function showNotify(text){
let box=document.getElementById("notifyBox")
document.getElementById("notifyText").innerText=text
box.style.display="block"
setTimeout(()=>{box.style.display="none"},2500)
}

function selectPay(m){
method=m
document.getElementById("bkash").classList.remove("active")
document.getElementById("nagad").classList.remove("active")
document.getElementById(m).classList.add("active")
}

function openBalance(){
document.getElementById("balancePopup").style.display="flex"
}

function closePopup(){
document.getElementById("balancePopup").style.display="none"
}

function nextStep(){
let amount=document.getElementById("amount").value
if(amount<100){
showNotify("Minimum deposit 100৳ required")
return
}
document.getElementById("loader").style.display="block"
setTimeout(()=>{
document.getElementById("loader").style.display="none"
document.getElementById("step2").style.display="block"
},1200)
}

function copyNumber(){
navigator.clipboard.writeText("01810607626")
showNotify("Number copied")
}

function submitBalance(){
let amount=Number(document.getElementById("amount").value)
balance+=amount
document.getElementById("balance").innerText=balance
showNotify("Balance added")
closePopup()
}

function order(pkg,stockId,barId,max,price){

if(balance < price){
showNotify("Insufficient balance")
return
}

balance-=price
document.getElementById("balance").innerText=balance

let stock=document.getElementById(stockId)
let current=parseInt(stock.innerText)

if(current<=0){
showNotify("Out of stock")
return
}

stock.innerText=current-1

let percent=((current-1)/max)*100
document.getElementById(barId).style.width=percent+"%"

showNotify(pkg+" order placed")

}

</script></body>
</html>
