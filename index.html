<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Diamond Shop</title><style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
color:white;
background:linear-gradient(270deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating diamonds */

.diamond{
position:fixed;
font-size:18px;
opacity:.35;
animation:floatDiamond 14s linear infinite;
}

@keyframes floatDiamond{
0%{transform:translateY(100vh) rotate(0)}
100%{transform:translateY(-10vh) rotate(360deg)}
}

/* header */

.header{
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
background:rgba(0,0,0,.3);
backdrop-filter:blur(6px);
}

/* notice */

.notice{
background:#f97316;
text-align:center;
padding:10px;
}

/* online */

.online{
text-align:center;
color:#22c55e;
margin-top:6px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:.6}
50%{opacity:1}
100%{opacity:.6}
}

/* wallet */

.wallet{
text-align:center;
margin:20px 0;
}

.addBtn{
width:90%;
max-width:420px;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
box-shadow:0 0 12px rgba(34,197,94,.4);
transition:.3s;
}

.addBtn:hover{
transform:scale(1.03);
}

/* cards */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
max-width:480px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:14px;
padding:16px;
text-align:center;
box-shadow:0 0 14px rgba(0,0,0,.6);
transition:.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 18px rgba(34,197,94,.6);
}

.price{
color:#22c55e;
font-size:20px;
font-weight:bold;
}

.stock{
font-size:12px;
color:#facc15;
}

.orderBtn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
transition:.3s;
}

.orderBtn:hover{
background:#16a34a;
transform:scale(1.03);
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.form{
background:#1e293b;
padding:20px;
border-radius:14px;
width:90%;
max-width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.7);
animation:popupIn .3s ease;
}

@keyframes popupIn{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

/* pay buttons */

.pay{
display:flex;
gap:10px;
margin-top:10px;
}

.pay div{
flex:1;
padding:10px;
border-radius:8px;
text-align:center;
color:white;
font-weight:bold;
cursor:pointer;
}

#bkash{
background:linear-gradient(135deg,#e2136e,#b80c88);
}

#nagad{
background:#f97316;
}

.pay div.active{
transform:scale(1.05);
box-shadow:0 0 10px white;
}

/* buttons */

.btn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
color:white;
}

.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#3b82f6}

/* loader */

.loader{
border:4px solid #1e293b;
border-top:4px solid #22c55e;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:15px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* notify */

.notify{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:12px 18px;
border-radius:14px;
font-size:13px;
box-shadow:0 0 20px rgba(34,197,94,.6);
display:none;
animation:notifyIn .3s ease;
}

@keyframes notifyIn{
from{opacity:0;transform:translate(-50%,-20px)}
to{opacity:1;transform:translate(-50%,0)}
}

/* bottom nav */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:8px 0;
border-top:1px solid #334155;
}

.bottomNav div{
background:#1e293b;
width:80px;
height:55px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
transition:.3s;
}

.bottomNav div:hover{
transform:scale(1.05);
}

.bottomNav div.active{
background:#22c55e;
}

/* history */

.history{
display:none;
padding:20px;
}

.historyItem{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-top:10px;
}

</style></head><body><!-- floating diamonds --><div class="diamond" style="left:10%">💎</div>

</body>
</html>
